# -- Services -----------------------------------------------------------------------

services:

  # -- Nextcloud  -------------------------------------------------------------------

  nextcloud:
    image: nextcloud:apache
    container_name: nextcloud
    environment:
      - MYSQL_HOST=nextcloud-db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - PHP_MEMORY_LIMIT=768M
      - PHP_UPLOAD_LIMIT=2G
      - REDIS_HOST=redis
    volumes:
      - /mnt/codex/nextcloud/data:/var/www/html
    networks:
      - internal
      - caddy_proxy
    depends_on:
      nextcloud-db:
        condition: service_healthy  # wait until DB passes healthcheck
      redis:
        condition: service_healthy  # was: service_starte
    restart: unless-stopped

  # -- Nextcloud DB  -----------------------------------------------------------------

  nextcloud-db:
    image: mariadb:lts
    container_name: nextcloud-db
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - /mnt/codex/nextcloud/db:/var/lib/mysql
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s  # give MariaDB time before first check

  # -- Redis -------------------------------------------------------------------------

  redis:
    image: redis:alpine
    container_name: nextcloud-redis
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]  # returns PONG when ready
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s  # Redis is fast, 5s is enough

  # -- Push-Proxy --------------------------------------------------------------------

  notify_push:
    image: nextcloud:latest
    container_name: notify_push
    restart: unless-stopped
    command: /var/www/html/custom_apps/notify_push/bin/aarch64/notify_push /var/www/html/config/config.php
    environment:
      NEXTCLOUD_URL: "http://nextcloud:80"
    volumes:
      - /mnt/codex/nextcloud/data:/var/www/html:ro
    networks:
      - internal
      - caddy_proxy
    depends_on:
      - nextcloud
      - nextcloud-db
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7867/test/cookie"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# -- Networks ------------------------------------------------------------------------

networks:
  internal:
    driver: bridge
  caddy_proxy:
    external: true
