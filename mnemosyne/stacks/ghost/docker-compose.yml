services:
  ghost:
    image: ghost:latest
    container_name: ghost
    environment:
      - url=https://blog.yourdomain.dedyn.io           # Finale öffentliche URL eintragen
      - database__client=mysql
      - database__connection__host=ghost-db
      - database__connection__user=ghost
      - database__connection__password=${GHOST_DB_PASSWORD}
      - database__connection__database=ghost
      - mail__transport=SMTP                  # Optional: E-Mail für Kommentar-Benachrichtigungen
      - mail__options__host=${MAIL_HOST}
      - mail__options__port=${MAIL_PORT}
      - mail__options__auth__user=${MAIL_USER}
      - mail__options__auth__pass=${MAIL_PASS}
      - mail__from=${MAIL_FROM}
      - mail__options__secureConnection=false
    volumes:
      - /mnt/codex/ghost/content:/var/lib/ghost/content
    networks:
      - caddy_proxy
      - ghost_internal
    depends_on:
      - ghost-db
    restart: unless-stopped

  ghost-db:
    image: mysql:8.0
    container_name: ghost-db
    environment:
      - MYSQL_ROOT_PASSWORD=${GHOST_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=ghost
      - MYSQL_USER=ghost
      - MYSQL_PASSWORD=${GHOST_DB_PASSWORD}
    volumes:
      - /mnt/codex/ghost/db:/var/lib/mysql
    networks:
      - ghost_internal
    restart: unless-stopped

networks:
  caddy_proxy:
    external: true
  ghost_internal:
    internal: true