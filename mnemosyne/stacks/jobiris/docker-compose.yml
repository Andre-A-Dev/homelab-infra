services:
  jobiris-board:
    build: .
    image: jobiris-app:latest
    container_name: jobiris-board
    restart: unless-stopped
    command: python3 board.py
    env_file:
      - .env
    environment:
      JOBIRIS_COMPOSE_DIR: /app
    volumes:
      - /home/youruser/homelab-infra/mnemosyne/stacks/jobiris:/app
      - /mnt/vault/jobiris:/mnt/vault/jobiris
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
    networks:
      - caddy_proxy

  jobiris-monitor:
    build: .
    image: jobiris-app:latest
    container_name: jobiris-monitor
    profiles: ["cli"]
    env_file:
      - .env
    volumes:
      - /home/youruser/homelab-infra/mnemosyne/stacks/jobiris:/app
      - /mnt/vault/jobiris:/mnt/vault/jobiris

networks:
  caddy_proxy:
    external: true