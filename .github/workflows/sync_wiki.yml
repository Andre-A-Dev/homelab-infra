name: Sync docs to Wiki

on:
  push:
    branches: [main]
    paths:
      - wiki/Home.md
      - ARCHITECTURE.md
      - RUNBOOK.md
      - SERVICES.md
  workflow_dispatch:    # allows manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone wiki
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki-repo

      - name: Copy docs to wiki
        run: |
          cp wiki/Home.md  wiki-repo/Home.md
          cp ARCHITECTURE.md wiki-repo/Architecture.md
          cp RUNBOOK.md      wiki-repo/Runbook.md
          cp SERVICES.md     wiki-repo/Services.md

      - name: Commit and push wiki
        run: |
          cd wiki-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Home.md Architecture.md Runbook.md Services.md
          git diff --cached --quiet && echo "No changes — wiki already up to date" && exit 0
          git commit -m "sync: update from repo (${GITHUB_SHA::7})"
          git push
