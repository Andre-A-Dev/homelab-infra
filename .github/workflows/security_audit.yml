name: Security audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    # Never block — warnings only
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run secret scanner
        run: |
          python3 - << 'PY'
          import re, sys
          from pathlib import Path

          # ── Patterns ──────────────────────────────────────────────────
          PATTERNS = [
              ("Password / passphrase assignment",
               r"(?i)(password|passwd|passphrase)\s*[=:]\s*[\"']?"
               r"(?![\s\"']*(?:$|[\$\{/]|\w+[\.\(]|os\.|CHANGEME|YOUR_|ENTER_|"
               r"your-|changeme|example|placeholder|TODO|none|null|NOPASSWD|ALL=|"
               r"[A-Z][A-Z_]{4,}\b))[^\s\"'\\#\(\.,/]{4,}",
               "fail"),
              ("API key / token assignment",
               r"(?i)(api_key|api_token|auth_token|access_token|bearer)\s*[=:]\s*[\"']?[A-Za-z0-9_\-]{16,}",
               "fail"),
              ("PEM private key block",
               r"BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY",
               "fail"),
              ("Tailscale auth key",
               r"tskey-[A-Za-z0-9\-]+",
               "fail"),
              ("Grafana service account token",
               r"glsa_[A-Za-z0-9]{32}",
               "fail"),
              ("Credentials embedded in URL",
               r"(?i)https?://[A-Za-z0-9._\-]{2,}:(?!\$\{)[^\s@\"'{\n\\]{4,}@[A-Za-z0-9._\-/]+",
               "fail"),
              ("Webhook secret value",
               r'"secret"\s*:\s*"[^"]{8,}"',
               "fail"),
              ("Username embedded in URL with token auth",
               r"(?i)https?://[A-Za-z0-9._\-]{2,}:\$\{[^}]+\}@",
               "warn"),
              ("Internal RFC-1918 IP in non-documentation file",
               r"192\.168\.\d{1,3}\.\d{1,3}",
               "warn"),
              ("Tailscale IP in non-documentation file",
               r"100\.\d{1,3}\.\d{1,3}\.\d{1,3}",
               "warn"),
          ]

          SKIP_DIRS  = {".git", "node_modules", "__pycache__", ".venv", ".idea"}
          SKIP_NAMES = {".env", ".env.example", "audit_report.html",
                        "audit_repo.py", "export_public.py"}
          BINARY_EXT = {".png",".jpg",".jpeg",".gif",".ico",".svg",".zip",
                        ".tar",".gz",".db",".sqlite",".bin",".pdf",
                        ".ttf",".woff",".woff2"}
          DOC_EXT    = {".md", ".rst", ".txt"}

          findings = []
          warnings = []

          def scan_file(path):
              rel      = str(path)
              is_doc   = path.suffix.lower() in DOC_EXT
              try:
                  content = path.read_text(encoding="utf-8", errors="strict")
              except (UnicodeDecodeError, PermissionError):
                  return
              for label, pattern, severity in PATTERNS:
                  if is_doc and ("IP" in label or "Tailscale" in label):
                      continue
                  flags = re.MULTILINE | re.IGNORECASE
                  for m in re.finditer(pattern, content, flags):
                      line_no = content[:m.start()].count("\n") + 1
                      line    = content.splitlines()[line_no - 1]
                      if line.lstrip().startswith("#") and severity == "warn":
                          continue
                      context = " ".join(line.split())[:120]
                      entry   = (severity, label, rel, line_no, context)
                      if severity == "fail":
                          findings.append(entry)
                      else:
                          warnings.append(entry)

          # Scan tracked files only
          import subprocess
          result = subprocess.run(
              ["git", "ls-files"], capture_output=True, text=True
          )
          for p in result.stdout.splitlines():
              path = Path(p.strip())
              if not path.exists():
                  continue
              if any(part in SKIP_DIRS for part in path.parts):
                  continue
              if path.name in SKIP_NAMES:
                  continue
              if path.suffix.lower() in BINARY_EXT:
                  continue
              scan_file(path)

          # Check for tracked .env files
          for f in result.stdout.splitlines():
              if Path(f).name == ".env":
                  findings.append(("fail", "Tracked .env file", f, 0,
                                   "Remove from tracking: git rm --cached " + f))

          # Check for private key files on disk
          for pat in ["*.key", "id_rsa", "id_ed25519", "*.pem"]:
              for match in Path(".").rglob(pat):
                  if any(p in SKIP_DIRS for p in match.parts):
                      continue
                  findings.append(("fail", "Private key file", str(match), 0,
                                   "Remove and add to .gitignore"))

          # Emit GitHub Actions annotations
          for sev, label, file, line, context in findings:
              loc = f"file={file},line={line}" if line else f"file={file}"
              print(f"::error {loc}::[SECRET SCANNER] {label} — {context}")

          for sev, label, file, line, context in warnings:
              loc = f"file={file},line={line}" if line else f"file={file}"
              print(f"::warning {loc}::[SECRET SCANNER] {label} — {context}")

          # Summary
          total_fail = len(findings)
          total_warn = len(warnings)
          print(f"\n::notice::Secret scanner: {total_fail} finding(s), {total_warn} warning(s)")

          if total_fail > 0:
              print("::error::Potential secrets found — review findings above.")
              # exit 0 — warnings only mode, never blocks the push
          sys.exit(0)
          PY
